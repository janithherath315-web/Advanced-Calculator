<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Calculator</title>
  <style>
    /* General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    /* Body Styling */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #121212;
      color: #ffffff;
    }

    /* Calculator Container */
    .calculator {
      background-color: #1e1e1e;
      border-radius: 15px;
      box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.5);
      width: 320px;
      padding: 20px;
    }

    /* Display Screen */
    .display {
      margin-bottom: 20px;
    }

    .display input {
      width: 100%;
      height: 60px;
      background-color: #2d2d2d;
      border: none;
      border-radius: 10px;
      color: #ffffff;
      font-size: 24px;
      text-align: right;
      padding: 10px;
      outline: none;
    }

    /* Buttons Grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    /* Button Styling */
    .buttons button {
      background-color: #333333;
      border: none;
      border-radius: 10px;
      color: #ffffff;
      font-size: 20px;
      padding: 20px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .buttons button:hover {
      background-color: #444444;
    }

    .buttons button.operator {
      background-color: #ff9500;
      color: #ffffff;
    }

    .buttons button.operator:hover {
      background-color: #ffaa33;
    }

    .buttons button.zero {
      grid-column: span 2;
    }

    .buttons button.equals {
      background-color: #34c759;
      color: #ffffff;
    }

    .buttons button.equals:hover {
      background-color: #30d158;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <input type="text" id="result" readonly>
    </div>
    <div class="buttons">
      <button onclick="clearDisplay()" class="operator">C</button>
      <button onclick="deleteLast()" class="operator">DEL</button>
      <button onclick="appendOperator('%')" class="operator">%</button>
      <button onclick="appendOperator('/')" class="operator">÷</button>
      <button onclick="appendNumber('7')">7</button>
      <button onclick="appendNumber('8')">8</button>
      <button onclick="appendNumber('9')">9</button>
      <button onclick="appendOperator('*')" class="operator">×</button>
      <button onclick="appendNumber('4')">4</button>
      <button onclick="appendNumber('5')">5</button>
      <button onclick="appendNumber('6')">6</button>
      <button onclick="appendOperator('-')" class="operator">−</button>
      <button onclick="appendNumber('1')">1</button>
      <button onclick="appendNumber('2')">2</button>
      <button onclick="appendNumber('3')">3</button>
      <button onclick="appendOperator('+')" class="operator">+</button>
      <button onclick="appendNumber('0')" class="zero">0</button>
      <button onclick="appendNumber('.')">.</button>
      <button onclick="calculate()" class="operator equals">=</button>
    </div>
  </div>
  <script>
    let result = document.getElementById('result');

    // Append numbers to the display
    function appendNumber(number) {
      result.value += number;
    }

    // Append operators to the display
    function appendOperator(operator) {
      result.value += operator;
    }

    // Clear the display
    function clearDisplay() {
      result.value = '';
    }

    // Delete the last character
    function deleteLast() {
      result.value = result.value.slice(0, -1);
    }

    // Calculate the result
    function calculate() {
      try {
        result.value = eval(result.value);
      } catch (error) {
        result.value = 'Error';
      }
    }
  </script>
</body>
</html>
